; The hostname below is an OpenSSH config alias (see ~/.ssh/config on the
; control machine) — Ansible's ssh connection plugin shells out to the real
; `ssh` binary, so it resolves the alias (HostName/User/IdentityFile)
; transparently. No credentials live in this repo.
[vllm_host]
vllm-host ansible_python_interpreter=/usr/bin/python3
