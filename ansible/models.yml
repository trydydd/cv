# Gallery model roster. Add an entry here to include a model in the next
# batch run — no playbook changes needed.
#
# resume_id: id used in config/resumes.yaml and the /gallery/<id>/ path.
# recipe:    recipe filename (without .yaml) in spark-vllm-docker/recipes/.
# label:     gallery card title.
# tier:      frontier | hosted | local | baseline (see docs/configuration.md).
#
# `description` is intentionally omitted: it's a qualitative read of the
# actual rendered output (layout, tone), which can only be judged after
# seeing what a given run produced. Leave it out here and do a short
# follow-up review pass to set it per-model once generation finishes —
# the script falls back to a generic default in the meantime.
models:
  - resume_id: qwen3-6-27b
    recipe: qwen3.6-27b-fp8
    label: "Qwen3.6 27B"
    tier: local

  - resume_id: qwen3-5-9b
    recipe: qwen3.5-9b
    label: "Qwen3.5 9B"
    tier: local

  - resume_id: gpt-oss-20b
    recipe: openai-gpt-oss-20b
    label: "GPT-OSS 20B"
    tier: local

  - resume_id: gemma4-26b-a4b
    recipe: gemma4-26b-a4b
    label: "Gemma4 26B-A4B"
    tier: local

  - resume_id: gemma4-12b
    recipe: gemma4-12b
    label: "Gemma4 12B"
    tier: local

  - resume_id: nemotron-3-nano-nvfp4
    recipe: nemotron-3-nano-nvfp4
    label: "Nemotron-3 Nano NVFP4"
    tier: local

  - resume_id: gemma4-e2b
    recipe: gemma4-e2b
    label: "Gemma4 E2B"
    tier: local

  - resume_id: lfm2-230m
    recipe: lfm2-230m
    label: "LFM2.5 230M"
    tier: local

  - resume_id: lfm2-1-2b-thinking
    recipe: lfm2-1-2b-thinking
    label: "LFM2.5 1.2B Thinking"
    tier: local
    # Required: this reasoning model's own docs warn that capping
    # max_tokens truncates its chain-of-thought before final content is
    # produced (see the recipe file for the full explanation).
    max_tokens: none

  - resume_id: lfm2-8b-a1b
    recipe: lfm2-8b-a1b
    label: "LFM2.5 8B-A1B"
    tier: local
    max_tokens: none
    # Explicit per the model's official vLLM deployment guide, rather than
    # relying on the server's own defaults matching by coincidence.
    temperature: 0.2
    top_k: 80
    repetition_penalty: 1.05

  - resume_id: gemma4-e4b
    recipe: gemma4-e4b
    label: "Gemma4 E4B"
    tier: local

  # Not a spark-vllm-docker recipe: this model is served via the
  # Entrpi/qwen3.5-122B-A10B-on-spark install.sh script (custom Docker image +
  # runtime patches for DFlash speculative decoding on DGX Spark hardware), run
  # by hand on vllm-host. Listed here for roster visibility only — the playbook
  # can't drive this one; regenerate manually per that repo's README.
  - resume_id: qwen3-5-122b
    recipe: null
    label: "Qwen3.5 122B-A10B"
    tier: local
    max_tokens: none
